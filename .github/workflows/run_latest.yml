name: Deploy tagged image from Docker Hub

on:
  workflow_dispatch:
    inputs:
      deploy_channel:
        description: "Target channel (preview or stable)"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - preview
      image_tag:
        description: "Image tag to deploy (for example: latest or git-abc1234)"
        required: true
        default: "latest"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
              mkdir -p ~/.ssh/
              echo "$SSH_KEY" > ~/.ssh/sadhana.key
              chmod 600 ~/.ssh/sadhana.key
              cat >>~/.ssh/config <<END
              Host sadhana
                HostName $SSH_HOST
                User $SSH_USER
                IdentityFile ~/.ssh/sadhana.key
                StrictHostKeyChecking no
              END
        env:
              SSH_USER: sadhana
              SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
              SSH_HOST: ${{ secrets.SSH_HOST }}
              
      - name: Executing update script
        run: |
          # Expects remote script signature:
          #   sadhana_reload.sh <channel> <tag>
          CHANNEL="${{ github.event.inputs.deploy_channel }}"
          TAG="${{ github.event.inputs.image_tag }}"
          ssh sadhana "bash /home/sadhana/scripts/sadhana_reload.sh ${CHANNEL} ${TAG}"
